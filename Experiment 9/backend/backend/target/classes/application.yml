server:
  port: 8080

app:
  jwt:
    # ⚠️  Classroom demo only. Use a stronger secret in production.
    secret: "classroom-super-secret-key-must-be-at-least-256-bits-long-for-hs256"
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  oauth2:
    # Optional demo mapping: if a Google email matches one of these addresses,
    # the backend will grant ROLE_ADMIN; otherwise users receive ROLE_USER.
    admin-emails: ""

spring:
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:livepoll;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:demo-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:demo-google-client-secret}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub

logging:
  level:
    com.classroom: DEBUG
    org.springframework.security: INFO
